<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Layout</title>
</head>
<body>
    <center>
   <table border="2" height="200" width="300px" cellspacing="0" cellpadding="2">
    <tr>
        <td>1</td>
        <td colspan="2">2</td>
        <td>3</td>
        <td>4</td>
        <!-- <td></td> -->
   
   
    </tr>
    <tr>
        <td>5</td>
        <td>6</td>
        <td rowspan="2"></td>
        <td>7</td>
        <td>8</td>
    
    
    </tr>
    <tr>
        <td>9</td> 
        <td rowspan="2">10</td>
        <td colspan="2" rowspan="2" >11<table border="2" height="80" width="100px" cellspacing="2" cellpadding="2">
            <tbody>
                <tr>
        <td>12</td>
        <td>13</td>
     </tr>
     <tr>
        <td>14</td>
        <td>15</td>
        </tr>
     </tbody>
     </table>
     </td>
     </tr>
     <tr>
     <td>16</td>
     <td>17</td>
     </tr>
   </table>
</center>
</body>
</html>
